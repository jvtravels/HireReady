<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Practice interviews with AI interviewers. Get real-time feedback, detailed analytics, and personalized coaching to ace your next job interview." />
    <link rel="canonical" href="https://hirestepx.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="HireStepX — AI-Powered Mock Interview Platform" />
    <meta property="og:description" content="Practice interviews with AI interviewers. Get real-time feedback, detailed analytics, and personalized coaching to ace your next job interview." />
    <meta property="og:url" content="https://hirestepx.com" />
    <meta property="og:site_name" content="HireStepX" />
    <meta property="og:image" content="/icons/icon-512.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="HireStepX — AI-Powered Mock Interview Platform" />
    <meta name="twitter:description" content="Practice interviews with AI interviewers. Get real-time feedback, detailed analytics, and personalized coaching to ace your next job interview." />
    <meta name="twitter:image" content="/icons/icon-512.png" />

    <meta name="theme-color" content="#050506" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <title>HireStepX — AI-Powered Mock Interview Platform</title>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "HireStepX",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "description": "AI-powered mock interview platform with voice interviews, STAR method scoring, speech analytics, and company-specific question banks for TCS, Infosys, Google, Amazon & more.",
      "url": "https://hirestepx.com",
      "offers": [
        { "@type": "Offer", "price": "0", "priceCurrency": "INR", "name": "Free", "description": "3 practice sessions" },
        { "@type": "Offer", "price": "49", "priceCurrency": "INR", "name": "Starter", "description": "10 sessions per week" },
        { "@type": "Offer", "price": "149", "priceCurrency": "INR", "name": "Pro", "description": "Unlimited sessions" }
      ],
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.7",
        "ratingCount": "520",
        "bestRating": "5"
      }
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does HireStepX work?",
          "acceptedAnswer": { "@type": "Answer", "text": "HireStepX uses AI interviewers with voice to conduct realistic mock interviews. You speak your answers, get real-time transcription, and receive detailed feedback with STAR method scoring and speech analytics." }
        },
        {
          "@type": "Question",
          "name": "Which companies does HireStepX prepare for?",
          "acceptedAnswer": { "@type": "Answer", "text": "HireStepX has company-specific question banks for TCS, Infosys, Wipro, Accenture, Cognizant, Google, Microsoft, Amazon, Flipkart, Meta, and more." }
        },
        {
          "@type": "Question",
          "name": "Does HireStepX support Hindi?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes, HireStepX supports interviews in English, Hindi, and Hinglish (Hindi-English mix) with AI voice and speech recognition in all three languages." }
        }
      ]
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />

    <!-- Inline critical CSS for instant FCP -->
    <style>
      body{margin:0;background:#060607}
      #root{min-height:100vh;background:#060607;color:#F5F2ED}
    </style>
    <!-- Non-render-blocking font load: swap from print→all after load -->
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" /></noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
